<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía Antiinflamatoria</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --g1:#1a3d2b;--g2:#2d6a4f;--g3:#52b788;--g4:#95d5b2;--g5:#d8f3dc;--g6:#f0fff4;
  --p1:#3d1a6e;--p2:#6b3fa0;--p3:#9b72cf;--p4:#d4b8f0;--p5:#f0e8ff;
  --a1:#c25d00;--a2:#e07b20;--a3:#f4a340;--a5:#fff4dc;
  --b1:#0d3b6e;--b2:#1565c0;--b3:#4a9edd;--b4:#b3d9f5;--b5:#e8f4fd;
  --t1:#004d40;--t2:#00695c;--t3:#26a69a;--t4:#b2dfdb;--t5:#e0f2f1;
  --r1:#b71c1c;--r2:#e53935;--r3:#ef9a9a;--r5:#ffebee;
  --text:#1a2e1e;--muted:#5a7a62;--bg:#f4f9f5;--white:#ffffff;
  --radius:18px;--shadow:0 4px 20px rgba(45,106,79,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HERO */
.hero{background:var(--g1);background-image:radial-gradient(ellipse at 100% 0%,rgba(82,183,136,0.3) 0%,transparent 50%);padding:44px 24px 32px;text-align:center;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:22px;background:var(--bg);border-radius:20px 20px 0 0}
.hero-emoji{font-size:48px;display:block;margin-bottom:12px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.hero h1{font-family:'Fraunces',serif;font-size:28px;color:white;margin-bottom:6px}
.hero-sub{color:var(--g4);font-size:13px;font-weight:300;margin-bottom:14px}
.hero-pills{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.pill{background:rgba(255,255,255,0.12);color:var(--g5);font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,0.15)}

/* NAV */
.nav{display:flex;background:var(--white);border-bottom:1px solid rgba(45,106,79,0.08);overflow-x:auto;scrollbar-width:none;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.nav::-webkit-scrollbar{display:none}
.nav-btn{padding:12px 16px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;flex-shrink:0;transition:all 0.2s;font-family:'Plus Jakarta Sans',sans-serif;background:none;border-top:none;border-left:none;border-right:none;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-btn .ni{font-size:17px}
.nav-btn.active{color:var(--g2);border-bottom-color:var(--g3)}

/* PAGES */
.page{display:none;padding:18px 15px 80px;max-width:680px;margin:0 auto}
.page.active{display:block;animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* TYPOGRAPHY */
.big-title{font-family:'Fraunces',serif;font-size:24px;color:var(--g1);margin:24px 0 4px;line-height:1.2}
.big-sub{font-size:13px;color:var(--muted);margin-bottom:18px}
.sec-hdr{margin:22px 0 14px;display:flex;align-items:center;gap:10px}
.sec-dot{width:9px;height:9px;border-radius:50%;background:var(--g3);flex-shrink:0}
.sec-ttl{font-family:'Fraunces',serif;font-size:19px;color:var(--g1)}

/* CARDS */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-bottom:12px;transition:transform 0.15s}
.card:active{transform:scale(0.99)}
.cband{height:4px;background:linear-gradient(90deg,var(--g2),var(--g3))}
.cband.p{background:linear-gradient(90deg,var(--p1),var(--p3))}
.cband.a{
